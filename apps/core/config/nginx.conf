# Nginx reverse proxy for Ollama — IP allowlist enforced here
# Add/remove IPs in the `allow` block below.

events {
    worker_connections 1024;
}

http {
    server {
        # Bind only to the Tailscale interface
        listen 100.102.161.30:11435;

        # ── Allowlist ────────────────────────────────────────────────────
        # Add your device Tailscale IPs here (one per line).
        # 100.x.y.z = Tailscale assigned IPs
        # 127.0.0.1 = localhost (the host machine itself)
        allow 100.102.161.30;    # this machine
        allow 127.0.0.1;         # localhost
        # allow 100.x.y.z;       # add phone / laptop / etc.
        deny all;                # block everything else

        location / {
            proxy_pass         http://host.docker.internal:11434;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 300s;   # allow long generation requests
            proxy_send_timeout 300s;
        }
    }
}
