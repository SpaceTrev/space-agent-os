# Space-Claw model tier configuration — updated 2026-03-26
# Strategy: Claude Max (via OpenClaw) is primary. Ollama is available but not the default.

tiers:
  primary:
    model: claude-sonnet-4-6
    provider: openclaw
    description: Default for all tasks — reasoning, code, planning, orchestration
    use_cases:
      - all general tasks
      - code generation and review
      - architecture and planning
      - agent orchestration
      - complex reasoning
    context_window: 200000
    max_tokens: 8096
    temperature: 0.2

  cloud_secondary:
    model: gemini/gemini-2.0-flash
    provider: google
    description: Parallel tasks, long-context document processing, Gemini-specific features
    use_cases:
      - parallel agent runs (when Claude Max is busy)
      - very long context (>100k tokens)
      - Google integrations
      - fallback if OpenClaw unreachable
    context_window: 1000000
    max_tokens: 8192
    temperature: 0.2

  local:
    model: qwen3-coder:30b
    provider: ollama
    base_url: ${OLLAMA_BASE_URL:-http://localhost:11434}
    description: Optional — offline work, cost-sensitive batch tasks, privacy-sensitive data
    use_cases:
      - offline development
      - high-volume cheap tasks
      - privacy-sensitive operations
      - cost optimization at scale
    context_window: 32768
    max_tokens: 8192
    temperature: 0.1
    enabled: ${OLLAMA_ENABLED:-false}

  local_general:
    model: gemma4:31b
    provider: ollama
    base_url: ${OLLAMA_BASE_URL:-http://localhost:11434}
    description: Gemma 4 31B — local general-purpose model for summarization, entity extraction, document quality scoring
    hardware: Apple M4 Pro, 48 GB unified memory (model uses ~19 GB)
    benchmark:
      speed_tok_s: 9-11
      summarization_latency_s: ~55  # 500 output tokens
      code_gen_latency_s: ~190      # 1500 output tokens
      note: thinking mode enabled by default; adds ~300-500 reasoning tokens per call
    use_cases:
      - document summarization (brain/memory ops)
      - named entity extraction
      - document quality scoring
      - privacy-sensitive document processing
      - offline general tasks
      - fallback when qwen3-coder overkill for non-code tasks
    context_window: 128000
    max_tokens: 8192
    temperature: 0.1
    enabled: ${OLLAMA_ENABLED:-false}

routing:
  default_tier: primary
  fallback_tier: cloud_secondary
  local_tier: local
  # Use local only when explicitly requested or OLLAMA_ENABLED=true
  prefer_local: false
